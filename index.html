<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FX Monitor" />
  <meta name="theme-color" content="#0a0f1a" />
  <title>USD/JPY FX Monitor</title>

  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="manifest" href="manifest.json" />

  <!-- Chart.js 3.x + date adapter + candlestick plugin -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@2.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1/dist/chartjs-chart-financial.min.js"></script>

  <style>
    :root {
      --bg:      #0a0f1a;
      --surface: #111827;
      --surf2:   #0f172a;
      --border:  rgba(255,255,255,0.08);
      --text:    #e2e8f0;
      --muted:   #64748b;
      --up:      #22c55e;
      --down:    #ef4444;
      --accent:  #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.hidden { display: none; }

    .modal-card {
      background: var(--surface);
      border: 1px solid rgba(59,130,246,0.45);
      border-radius: 20px;
      padding: 28px 24px 22px;
      width: 100%; max-width: 380px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.65);
    }
    .modal-icon  { font-size: 36px; text-align: center; margin-bottom: 10px; }
    .modal-title { font-size: 17px; font-weight: 800; color: #fff; text-align: center; margin-bottom: 6px; }
    .modal-desc  { font-size: 12px; color: var(--muted); text-align: center; line-height: 1.75; margin-bottom: 20px; }
    .modal-desc a { color: var(--accent); }

    .modal-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }

    .key-wrap { position: relative; margin-bottom: 8px; }
    .key-input {
      width: 100%;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 44px 13px 14px;
      color: var(--text);
      font-size: 13px; font-family: 'Courier New', monospace;
      outline: none; transition: border-color 0.2s; -webkit-appearance: none;
    }
    .key-input:focus  { border-color: rgba(59,130,246,0.6); }
    .key-input::placeholder { color: #334155; font-family: -apple-system, sans-serif; }
    .key-input.err { border-color: var(--down); }
    .key-eye {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 16px; padding: 4px; line-height: 1;
    }

    .key-err-msg { font-size: 11px; color: var(--down); margin-bottom: 10px; min-height: 16px; }

    .key-status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .key-status     { font-size: 11px; color: var(--muted); }
    .key-status.ok  { color: var(--up); }
    .key-clear { font-size: 11px; color: var(--down); background: none; border: none; cursor: pointer; text-decoration: underline; display: none; }

    .modal-save {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #1d4ed8, #1e40af);
      border: none; border-radius: 10px; color: #fff;
      font-size: 15px; font-weight: 700; cursor: pointer;
      margin-bottom: 14px; -webkit-appearance: none;
      box-shadow: 0 4px 16px rgba(29,78,216,0.4); transition: opacity 0.15s;
    }
    .modal-save:active { opacity: 0.8; }

    .modal-note { font-size: 10px; color: #334155; text-align: center; line-height: 1.6; }

    /* ── Header ── */
    .header {
      background: linear-gradient(180deg, var(--surface) 0%, rgba(17,24,39,0.96) 100%);
      border-bottom: 1px solid var(--border);
      padding: env(safe-area-inset-top, 44px) 16px 14px;
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 12px;
    }
    .pair-label   { font-size: 10px; letter-spacing: 2px; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
    .current-rate { font-size: 38px; font-weight: 800; color: #fff; letter-spacing: -1px; line-height: 1; font-variant-numeric: tabular-nums; }
    .rate-change  { font-size: 13px; font-weight: 600; margin-top: 5px; }
    .rate-change.up      { color: var(--up); }
    .rate-change.down    { color: var(--down); }
    .rate-change.neutral { color: var(--muted); }
    .header-btns { display: flex; align-items: center; gap: 8px; padding-bottom: 2px; }
    .icon-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 9px; color: var(--muted);
      font-size: 16px; padding: 7px 9px; cursor: pointer;
      -webkit-appearance: none; line-height: 1; transition: background 0.2s;
    }
    .icon-btn:active { background: rgba(255,255,255,0.12); }

    /* ── Interval selector ── */
    .tf-bar {
      display: flex; gap: 8px;
      padding: 11px 16px;
      background: var(--surf2);
      border-bottom: 1px solid var(--border);
    }
    .tf-btn {
      flex: 1; padding: 9px 0;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px; font-weight: 600;
      cursor: pointer; -webkit-appearance: none; transition: all 0.18s;
    }
    .tf-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .tf-btn:active:not(.active) { opacity: 0.7; }

    /* ── Chart area ── */
    .chart-section {
      flex: 1; padding: 10px 12px 6px;
      position: relative; min-height: 270px;
    }
    .chart-wrap { position: relative; height: 260px; }
    #chart { width: 100%; height: 100%; }

    .chart-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; background: rgba(10,15,26,0.88); border-radius: 8px;
    }
    .chart-overlay.hidden { display: none; }
    .ov-spin { font-size: 26px; color: var(--accent); animation: spin 1s linear infinite; }
    .ov-msg  { font-size: 13px; color: var(--muted); }
    .ov-err  { font-size: 12px; color: var(--down); text-align: center; line-height: 1.7; padding: 0 20px; }
    .ov-err.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat-cell {
      background: var(--surf2);
      padding: 14px 16px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat-cell:nth-child(2n) { border-right: none; }
    .stat-cell:nth-child(3),
    .stat-cell:nth-child(4) { border-bottom: none; }
    .stat-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.8px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .stat-val { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; font-variant-numeric: tabular-nums; }
    .stat-val.up   { color: var(--up); }
    .stat-val.down { color: var(--down); }
    .stat-val.neu  { color: var(--text); }

    /* ── Bottom bar ── */
    .bottom-bar {
      padding: 12px 16px;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .refresh-btn {
      padding: 11px 22px;
      background: linear-gradient(135deg, #1d4ed8, #1e40af);
      border: none; border-radius: 10px; color: #fff;
      font-size: 14px; font-weight: 700; cursor: pointer;
      -webkit-appearance: none;
      box-shadow: 0 2px 10px rgba(29,78,216,0.4); transition: opacity 0.15s;
      white-space: nowrap;
    }
    .refresh-btn:active   { opacity: 0.8; }
    .refresh-btn:disabled { background: #1e293b; box-shadow: none; cursor: not-allowed; }

    .update-info { text-align: right; }
    .update-time  { font-size: 11px; color: var(--muted); }
    .api-note     { font-size: 9px; color: #1e293b; margin-top: 2px; }
  </style>
</head>
<body>

  <!-- ── APIキー設定モーダル ── -->
  <div class="modal-overlay hidden" id="modal">
    <div class="modal-card">
      <div class="modal-icon">🔑</div>
      <div class="modal-title">Alpha Vantage APIキー設定</div>
      <div class="modal-desc">
        無料APIキーは <a href="https://www.alphavantage.co/support/#api-key" target="_blank" rel="noopener">alphavantage.co</a> で取得できます。<br>
        ※ 無料プランは <b style="color:#e2e8f0">1日25回</b> まで
      </div>

      <div class="modal-label">APIキーを入力</div>
      <div class="key-wrap">
        <input type="password" class="key-input" id="key-input"
               placeholder="YOUR_ALPHA_VANTAGE_KEY"
               autocomplete="off" spellcheck="false" />
        <button class="key-eye" id="key-eye" onclick="toggleEye()" type="button">👁️</button>
      </div>
      <div class="key-err-msg" id="key-err"></div>

      <div class="key-status-row">
        <span class="key-status" id="key-status">未設定</span>
        <button class="key-clear" id="key-clear" onclick="clearKey()" type="button">削除</button>
      </div>

      <button class="modal-save" onclick="saveKey()">保存してチャートを表示</button>

      <div class="modal-note">
        キーはブラウザの <code style="color:#475569">localStorage</code> にのみ保存されます。
      </div>
    </div>
  </div>

  <!-- ── ヘッダー ── -->
  <div class="header">
    <div>
      <div class="pair-label">USD / JPY</div>
      <div class="current-rate" id="current-rate">---.---</div>
      <div class="rate-change neutral" id="rate-change">--- (+-.--% 始値比)</div>
    </div>
    <div class="header-btns">
      <button class="icon-btn" onclick="showModal()" title="APIキー設定">⚙️</button>
    </div>
  </div>

  <!-- ── 時間足セレクター ── -->
  <div class="tf-bar">
    <button class="tf-btn active" id="tf-1min"  onclick="setTf('1min')">1分足</button>
    <button class="tf-btn"        id="tf-15min" onclick="setTf('15min')">15分足</button>
    <button class="tf-btn"        id="tf-60min" onclick="setTf('60min')">1時間足</button>
  </div>

  <!-- ── チャート ── -->
  <div class="chart-section">
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
      <div class="chart-overlay" id="overlay">
        <div class="ov-spin" id="ov-spin">⟳</div>
        <div class="ov-msg" id="ov-msg">APIキーを設定してください</div>
        <div class="ov-err hidden" id="ov-err"></div>
      </div>
    </div>
  </div>

  <!-- ── 統計グリッド ── -->
  <div class="stats-grid">
    <div class="stat-cell">
      <div class="stat-lbl">始値 (当日 UTC)</div>
      <div class="stat-val neu" id="s-open">---.---</div>
    </div>
    <div class="stat-cell">
      <div class="stat-lbl">高値 (当日 UTC)</div>
      <div class="stat-val up" id="s-high">---.---</div>
    </div>
    <div class="stat-cell">
      <div class="stat-lbl">安値 (当日 UTC)</div>
      <div class="stat-val down" id="s-low">---.---</div>
    </div>
    <div class="stat-cell">
      <div class="stat-lbl">前日終値</div>
      <div class="stat-val neu" id="s-prev">---.---</div>
    </div>
  </div>

  <!-- ── ボトムバー ── -->
  <div class="bottom-bar">
    <button class="refresh-btn" id="refresh-btn" onclick="fetchData()">🔄 データ更新</button>
    <div class="update-info">
      <div class="update-time" id="update-time">未取得</div>
      <div class="api-note">無料プラン: 25回/日 · 5回/分</div>
    </div>
  </div>

  <script>
    // ── APIキー管理 ────────────────────────────────────────────────
    const KEY_STORAGE = 'fx_api_key';
    const loadKey = () => localStorage.getItem(KEY_STORAGE) || '';

    function showModal() {
      const k = loadKey();
      const st = document.getElementById('key-status');
      const cl = document.getElementById('key-clear');
      if (k) {
        st.textContent = '保存済み: ' + k.slice(0, 4) + '••••' + k.slice(-4);
        st.className = 'key-status ok';
        cl.style.display = 'block';
      } else {
        st.textContent = '未設定';
        st.className = 'key-status';
        cl.style.display = 'none';
      }
      document.getElementById('key-input').value = '';
      document.getElementById('key-err').textContent = '';
      document.getElementById('key-input').classList.remove('err');
      document.getElementById('modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('key-input').focus(), 80);
    }

    function hideModal() { document.getElementById('modal').classList.add('hidden'); }

    function saveKey() {
      const input = document.getElementById('key-input');
      const key   = input.value.trim();
      if (!key) {
        input.classList.add('err');
        document.getElementById('key-err').textContent = 'APIキーを入力してください';
        return;
      }
      input.classList.remove('err');
      document.getElementById('key-err').textContent = '';
      localStorage.setItem(KEY_STORAGE, key);
      hideModal();
      fetchData();
    }

    function clearKey() {
      localStorage.removeItem(KEY_STORAGE);
      document.getElementById('key-status').textContent = '未設定';
      document.getElementById('key-status').className = 'key-status';
      document.getElementById('key-clear').style.display = 'none';
      document.getElementById('key-input').value = '';
      document.getElementById('key-input').focus();
    }

    function toggleEye() {
      const inp = document.getElementById('key-input');
      const eye = document.getElementById('key-eye');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      eye.textContent = inp.type === 'password' ? '👁️' : '🙈';
    }

    document.getElementById('key-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveKey();
    });

    // ── チャート状態 ────────────────────────────────────────────────
    let chart = null;
    let currentTf = '1min';

    function setTf(tf) {
      if (tf === currentTf) return;
      currentTf = tf;
      ['1min', '15min', '60min'].forEach(t =>
        document.getElementById(`tf-${t}`).classList.toggle('active', t === tf)
      );
      fetchData();
    }

    // ── UI ヘルパー ─────────────────────────────────────────────────
    function showLoading() {
      const ov = document.getElementById('overlay');
      ov.classList.remove('hidden');
      document.getElementById('ov-spin').style.display = '';
      document.getElementById('ov-msg').style.display  = '';
      document.getElementById('ov-msg').textContent    = 'データ取得中…';
      document.getElementById('ov-err').classList.add('hidden');
      document.getElementById('refresh-btn').disabled  = true;
    }

    function hideOverlay() {
      document.getElementById('overlay').classList.add('hidden');
      document.getElementById('refresh-btn').disabled = false;
    }

    function showError(msg) {
      const ov = document.getElementById('overlay');
      ov.classList.remove('hidden');
      document.getElementById('ov-spin').style.display = 'none';
      document.getElementById('ov-msg').style.display  = 'none';
      const err = document.getElementById('ov-err');
      err.classList.remove('hidden');
      err.textContent = msg;
      document.getElementById('refresh-btn').disabled = false;
    }

    function fmt(v) { return v == null ? '---' : v.toFixed(3); }

    // ── Alpha Vantage データ取得 ────────────────────────────────────
    async function fetchData() {
      const apiKey = loadKey();
      if (!apiKey) { showModal(); return; }

      showLoading();

      try {
        const url = `https://www.alphavantage.co/query?function=FX_INTRADAY` +
                    `&from_symbol=USD&to_symbol=JPY&interval=${currentTf}` +
                    `&outputsize=compact&apikey=${apiKey}`;

        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status} — ネットワークエラー`);

        const raw = await res.json();

        // Alpha Vantage エラーレスポンス判定
        if (raw['Error Message'])
          throw new Error('APIキーが無効です。⚙️ から再設定してください。\n' + raw['Error Message']);
        if (raw['Note'])
          throw new Error('APIレート制限（5回/分）超過。1分待ってから再試行してください。');
        if (raw['Information'])
          throw new Error('1日の利用上限（25回）に達しました。明日また試してください。');

        const seriesKey = `Time Series FX (${currentTf})`;
        const series = raw[seriesKey];
        if (!series || Object.keys(series).length === 0)
          throw new Error('データが取得できませんでした。市場時間外の可能性があります。');

        // パース（Alpha Vantage FX の timestamp は UTC）
        const bars = Object.entries(series)
          .map(([t, o]) => ({
            x: new Date(t.replace(' ', 'T') + 'Z').getTime(),
            o: parseFloat(o['1. open']),
            h: parseFloat(o['2. high']),
            l: parseFloat(o['3. low']),
            c: parseFloat(o['4. close']),
          }))
          .sort((a, b) => a.x - b.x);

        renderChart(bars);
        updateStats(bars);
        hideOverlay();
        document.getElementById('update-time').textContent =
          '更新: ' + new Date().toLocaleTimeString('ja-JP');

      } catch (e) {
        showError(e.message);
      }
    }

    // ── ローソク足チャート描画 ────────────────────────────────────
    function renderChart(bars) {
      const canvas = document.getElementById('chart');
      if (chart) { chart.destroy(); chart = null; }

      const isHour = currentTf === '60min';
      chart = new Chart(canvas, {
        type: 'candlestick',
        data: {
          datasets: [{
            label: 'USD/JPY',
            data: bars,
            color: {
              up:        '#22c55e',
              down:      '#ef4444',
              unchanged: '#64748b',
            },
            borderColor: {
              up:        '#22c55e',
              down:      '#ef4444',
              unchanged: '#64748b',
            },
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1e293b',
              titleColor:  '#94a3b8',
              bodyColor:   '#e2e8f0',
              borderColor: 'rgba(255,255,255,0.1)',
              borderWidth: 1,
              callbacks: {
                title: items => {
                  if (!items.length) return '';
                  const d = new Date(items[0].raw.x);
                  return d.toLocaleString('ja-JP', {
                    month: 'numeric', day: 'numeric',
                    hour: '2-digit', minute: '2-digit',
                    timeZone: 'Asia/Tokyo'
                  }) + ' JST';
                },
                label: ctx => {
                  const d = ctx.raw;
                  return [
                    `始値  ${fmt(d.o)}`,
                    `高値  ${fmt(d.h)}`,
                    `安値  ${fmt(d.l)}`,
                    `終値  ${fmt(d.c)}`,
                  ];
                }
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              time: {
                unit: isHour ? 'hour' : 'minute',
                displayFormats: {
                  minute: 'H:mm',
                  hour:   'M/d H:mm',
                },
              },
              offset: true,
              grid:  { color: 'rgba(255,255,255,0.04)' },
              ticks: { color: '#475569', maxTicksLimit: 8, maxRotation: 0 },
            },
            y: {
              position: 'right',
              grid:  { color: 'rgba(255,255,255,0.04)' },
              ticks: { color: '#475569', callback: v => v.toFixed(2) },
            }
          }
        }
      });
    }

    // ── 統計情報更新 ────────────────────────────────────────────────
    function updateStats(bars) {
      const latest = bars[bars.length - 1];
      const current = latest.c;

      // 当日 UTC の境界を計算
      const now = new Date();
      const todayUTC = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate());
      const todayBars = bars.filter(b => b.x >= todayUTC);
      const prevBars  = bars.filter(b => b.x <  todayUTC);

      const session = todayBars.length > 0 ? todayBars : bars;
      const high  = Math.max(...session.map(b => b.h));
      const low   = Math.min(...session.map(b => b.l));
      const open  = session[0].o;
      const prev  = prevBars.length > 0 ? prevBars[prevBars.length - 1].c : null;

      // ヘッダー現在レート
      document.getElementById('current-rate').textContent = fmt(current);

      // 始値比変化
      const diff    = current - open;
      const diffPct = (diff / open) * 100;
      const sign    = diff >= 0 ? '+' : '';
      const chEl    = document.getElementById('rate-change');
      chEl.textContent = `${sign}${fmt(diff)} (${sign}${diffPct.toFixed(2)}% 始値比)`;
      chEl.className   = 'rate-change ' + (diff > 0 ? 'up' : diff < 0 ? 'down' : 'neutral');

      // 統計セル
      document.getElementById('s-open').textContent = fmt(open);
      document.getElementById('s-high').textContent = fmt(high);
      document.getElementById('s-low').textContent  = fmt(low);
      document.getElementById('s-prev').textContent = fmt(prev);
    }

    // ── 起動処理 ────────────────────────────────────────────────────
    if (!loadKey()) {
      showModal();
    } else {
      fetchData();
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => console.warn('SW:', err));
      });
    }
  </script>
</body>
</html>
