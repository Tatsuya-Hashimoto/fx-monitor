<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0f1a" />
  <title>USD/JPY チャート</title>
  <link rel="manifest" href="manifest.json" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@2.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1/dist/chartjs-chart-financial.min.js"></script>

  <style>
    :root {
      --bg:     #0a0f1a;
      --surf:   #111827;
      --surf2:  #0f172a;
      --border: rgba(255,255,255,0.08);
      --text:   #e2e8f0;
      --muted:  #64748b;
      --up:     #22c55e;
      --down:   #ef4444;
      --accent: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      display: flex; flex-direction: column;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; backdrop-filter: blur(4px);
    }
    .modal-overlay.hidden { display: none; }
    .modal-card {
      background: var(--surf);
      border: 1px solid rgba(59,130,246,0.45);
      border-radius: 20px; padding: 28px 24px 22px;
      width: 100%; max-width: 360px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.65);
    }
    .m-icon  { font-size: 34px; text-align: center; margin-bottom: 8px; }
    .m-title { font-size: 16px; font-weight: 800; color: #fff; text-align: center; margin-bottom: 6px; }
    .m-desc  { font-size: 12px; color: var(--muted); text-align: center; line-height: 1.75; margin-bottom: 18px; }
    .m-desc a { color: var(--accent); }
    .m-lbl   { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 7px; }
    .m-wrap  { position: relative; margin-bottom: 8px; }
    .m-input {
      width: 100%; background: var(--surf2);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 13px 44px 13px 14px; color: var(--text);
      font-size: 13px; font-family: 'Courier New', monospace;
      outline: none; transition: border-color 0.2s; -webkit-appearance: none;
    }
    .m-input:focus { border-color: rgba(59,130,246,0.6); }
    .m-input::placeholder { color: #334155; font-family: -apple-system, sans-serif; }
    .m-input.err { border-color: var(--down); }
    .m-eye {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 16px; padding: 4px; line-height: 1;
    }
    .m-err  { font-size: 11px; color: var(--down); min-height: 16px; margin-bottom: 10px; }
    .m-save {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #1d4ed8, #1e40af);
      border: none; border-radius: 10px; color: #fff;
      font-size: 15px; font-weight: 700; cursor: pointer;
      -webkit-appearance: none; box-shadow: 0 4px 16px rgba(29,78,216,0.4);
    }
    .m-save:active { opacity: 0.8; }

    /* ── Toolbar ── */
    .toolbar {
      background: var(--surf2);
      border-bottom: 1px solid var(--border);
      padding: env(safe-area-inset-top, 44px) 12px 10px;
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    .tf-btn {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--muted); font-size: 13px; font-weight: 600;
      cursor: pointer; -webkit-appearance: none; transition: all 0.18s;
      white-space: nowrap;
    }
    .tf-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .tf-btn:active:not(.active) { opacity: 0.7; }

    .tb-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .live-dot.on  { background: var(--up);   animation: pulse 2s infinite; }
    .live-dot.err { background: var(--down); }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .cd-txt  { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .wl-txt  { font-size: 13px; color: var(--muted); }
    .wl-txt.on { color: var(--accent); }
    .gear-sm {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--muted); font-size: 14px; padding: 5px 7px;
      cursor: pointer; -webkit-appearance: none; line-height: 1;
    }
    .gear-sm:active { background: rgba(255,255,255,0.12); }

    /* ── Chart fill ── */
    .chart-area {
      flex: 1; position: relative; overflow: hidden;
      min-height: 0;
    }
    #chart {
      position: absolute; inset: 4px 4px 4px 4px;
      width: calc(100% - 8px) !important;
      height: calc(100% - 8px) !important;
    }

    .chart-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; background: rgba(10,15,26,0.9);
    }
    .chart-overlay.hidden { display: none; }
    .ov-spin { font-size: 28px; color: var(--accent); animation: spin 1s linear infinite; }
    .ov-msg  { font-size: 13px; color: var(--muted); }
    .ov-err  { font-size: 12px; color: var(--down); text-align: center; line-height: 1.7; padding: 0 24px; }
    .ov-err.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .bottom-pad {
      height: env(safe-area-inset-bottom, 0px);
      background: var(--bg); flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- APIキーモーダル -->
  <div class="modal-overlay hidden" id="modal">
    <div class="modal-card">
      <div class="m-icon">🔑</div>
      <div class="m-title">Alpha Vantage APIキー設定</div>
      <div class="m-desc">
        無料キーは <a href="https://www.alphavantage.co/support/#api-key" target="_blank" rel="noopener">alphavantage.co</a> で取得できます。<br>
        ※ 無料プランは <b style="color:#e2e8f0">1日25回</b> · 5回/分まで
      </div>
      <div class="m-lbl">APIキー</div>
      <div class="m-wrap">
        <input type="password" class="m-input" id="m-input"
               placeholder="YOUR_API_KEY" autocomplete="off" spellcheck="false" />
        <button class="m-eye" id="m-eye" onclick="toggleEye()" type="button">👁️</button>
      </div>
      <div class="m-err" id="m-err"></div>
      <button class="m-save" onclick="saveKey()">保存してチャート表示</button>
    </div>
  </div>

  <!-- ツールバー -->
  <div class="toolbar">
    <button class="tf-btn active" id="tf-1min"  onclick="setTf('1min')">1分足</button>
    <button class="tf-btn"        id="tf-15min" onclick="setTf('15min')">15分足</button>
    <button class="tf-btn"        id="tf-60min" onclick="setTf('60min')">1時間足</button>
    <div class="tb-right">
      <div class="live-dot" id="live-dot"></div>
      <div class="cd-txt" id="cd-txt">---</div>
      <div class="wl-txt" id="wl-txt">🔓</div>
      <button class="gear-sm" onclick="showModal()">⚙️</button>
    </div>
  </div>

  <!-- フルスクリーンチャート -->
  <div class="chart-area">
    <canvas id="chart"></canvas>
    <div class="chart-overlay" id="overlay">
      <div class="ov-spin" id="ov-spin">⟳</div>
      <div class="ov-msg"  id="ov-msg">APIキーを設定してください</div>
      <div class="ov-err hidden" id="ov-err"></div>
    </div>
  </div>

  <div class="bottom-pad"></div>

  <script>
    // ── APIキー ────────────────────────────────────────────
    const KEY = 'fx_api_key';
    const loadKey = () => localStorage.getItem(KEY) || '';

    function showModal() {
      document.getElementById('m-input').value = '';
      document.getElementById('m-err').textContent = '';
      document.getElementById('m-input').classList.remove('err');
      document.getElementById('modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('m-input').focus(), 80);
    }
    function hideModal() { document.getElementById('modal').classList.add('hidden'); }

    function saveKey() {
      const k = document.getElementById('m-input').value.trim();
      if (!k) {
        document.getElementById('m-input').classList.add('err');
        document.getElementById('m-err').textContent = 'APIキーを入力してください';
        return;
      }
      localStorage.setItem(KEY, k);
      hideModal();
      startCycle();
    }

    function toggleEye() {
      const inp = document.getElementById('m-input');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      document.getElementById('m-eye').textContent = inp.type === 'password' ? '👁️' : '🙈';
    }
    document.getElementById('m-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveKey();
    });

    // ── WakeLock ───────────────────────────────────────────
    let wakeLock = null;

    async function acquireWakeLock() {
      if (!('wakeLock' in navigator)) { setWl(false); return; }
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => { wakeLock = null; setWl(false); });
        setWl(true);
      } catch { setWl(false); }
    }

    function setWl(on) {
      const el = document.getElementById('wl-txt');
      el.textContent = on ? '🔒' : '🔓';
      el.className   = 'wl-txt' + (on ? ' on' : '');
    }

    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible' && !wakeLock) await acquireWakeLock();
    });

    // ── 時間足 ─────────────────────────────────────────────
    let chart = null;
    let currentTf = '1min';

    function setTf(tf) {
      if (tf === currentTf) return;
      currentTf = tf;
      ['1min','15min','60min'].forEach(t =>
        document.getElementById(`tf-${t}`).classList.toggle('active', t === tf)
      );
      startCycle();
    }

    // ── UI helpers ─────────────────────────────────────────
    function setLive(state) {
      const dot = document.getElementById('live-dot');
      dot.className = 'live-dot' + (state === 'on' ? ' on' : state === 'err' ? ' err' : '');
    }

    function showLoading() {
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('ov-spin').style.display = '';
      document.getElementById('ov-msg').style.display  = '';
      document.getElementById('ov-msg').textContent    = 'データ取得中…';
      document.getElementById('ov-err').classList.add('hidden');
    }

    function hideOverlay() { document.getElementById('overlay').classList.add('hidden'); }

    function showError(msg) {
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('ov-spin').style.display = 'none';
      document.getElementById('ov-msg').style.display  = 'none';
      const err = document.getElementById('ov-err');
      err.classList.remove('hidden');
      err.textContent = msg;
    }

    // ── 自動更新サイクル ────────────────────────────────────
    const REFRESH_SEC = 60;
    let countdown = REFRESH_SEC;
    let cycleTimer = null;

    function startCycle() {
      if (cycleTimer) clearInterval(cycleTimer);
      countdown = 0;
      fetchData();
      cycleTimer = setInterval(() => {
        countdown--;
        if (countdown <= 0) { countdown = REFRESH_SEC; fetchData(); }
        document.getElementById('cd-txt').textContent =
          countdown > 0 ? `${countdown}s` : '更新中…';
      }, 1000);
    }

    // ── データ取得 ──────────────────────────────────────────
    async function fetchData() {
      const apiKey = loadKey();
      if (!apiKey) { showModal(); return; }

      showLoading();
      setLive('loading');

      try {
        const url = 'https://www.alphavantage.co/query?function=FX_INTRADAY' +
                    '&from_symbol=USD&to_symbol=JPY&interval=' + currentTf +
                    '&outputsize=compact&apikey=' + apiKey;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const raw = await res.json();

        if (raw['Error Message']) throw new Error('APIキーが無効です。⚙️ から再設定してください');
        if (raw['Note'])          throw new Error('レート制限（5回/分）超過。1分後に自動更新します');
        if (raw['Information'])   throw new Error('1日の上限（25回）に達しました。明日また試してください');

        const seriesKey = `Time Series FX (${currentTf})`;
        const series = raw[seriesKey];
        if (!series) throw new Error('データが取得できませんでした。市場時間外の可能性があります');

        const bars = Object.entries(series)
          .map(([t, o]) => ({
            x: new Date(t.replace(' ', 'T') + 'Z').getTime(),
            o: parseFloat(o['1. open']),
            h: parseFloat(o['2. high']),
            l: parseFloat(o['3. low']),
            c: parseFloat(o['4. close']),
          }))
          .sort((a, b) => a.x - b.x);

        renderChart(bars);
        hideOverlay();
        setLive('on');

      } catch (e) {
        showError(e.message);
        setLive('err');
      }
    }

    // ── チャート描画 ─────────────────────────────────────────
    function renderChart(bars) {
      const canvas = document.getElementById('chart');
      if (chart) { chart.destroy(); chart = null; }

      const isHour = currentTf === '60min';
      chart = new Chart(canvas, {
        type: 'candlestick',
        data: {
          datasets: [{
            label: 'USD/JPY',
            data: bars,
            color:       { up: '#22c55e', down: '#ef4444', unchanged: '#64748b' },
            borderColor: { up: '#22c55e', down: '#ef4444', unchanged: '#64748b' },
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1e293b',
              titleColor:  '#94a3b8',
              bodyColor:   '#e2e8f0',
              borderColor: 'rgba(255,255,255,0.1)',
              borderWidth: 1,
              callbacks: {
                title: items => {
                  if (!items.length) return '';
                  return new Date(items[0].raw.x).toLocaleString('ja-JP', {
                    month: 'numeric', day: 'numeric',
                    hour: '2-digit', minute: '2-digit',
                    timeZone: 'Asia/Tokyo',
                  }) + ' JST';
                },
                label: ctx => {
                  const d = ctx.raw;
                  const f = v => v.toFixed(3);
                  return [`始値 ${f(d.o)}`, `高値 ${f(d.h)}`, `安値 ${f(d.l)}`, `終値 ${f(d.c)}`];
                }
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              time: {
                unit: isHour ? 'hour' : 'minute',
                displayFormats: { minute: 'H:mm', hour: 'M/d H:mm' },
              },
              offset: true,
              grid:  { color: 'rgba(255,255,255,0.04)' },
              ticks: { color: '#475569', maxTicksLimit: 8, maxRotation: 0 },
            },
            y: {
              position: 'right',
              grid:  { color: 'rgba(255,255,255,0.04)' },
              ticks: { color: '#475569', callback: v => v.toFixed(2) },
            }
          }
        }
      });
    }

    // ── 起動 ───────────────────────────────────────────────
    acquireWakeLock();
    if (!loadKey()) {
      showModal();
    } else {
      startCycle();
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () =>
        navigator.serviceWorker.register('./sw.js').catch(() => {})
      );
    }
  </script>
</body>
</html>
